<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Source Sans 3', sans-serif; background: #1a1a1a; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
  .card { background: #2a2a2a; border-radius: 12px; padding: 2rem; max-width: 360px; width: 100%; color: white; }
  h2 { font-size: 1.1rem; margin-bottom: 1.25rem; opacity: 0.8; }
  .flash { background: #3d1a1a; border: 1px solid #c0392b; color: #ff7c7c; padding: 0.65rem 0.85rem; border-radius: 6px; font-size: 13px; margin-bottom: 1rem; }
  label { display: block; font-size: 13px; opacity: 0.6; margin-bottom: 6px; }
  input { width: 100%; padding: 0.65rem 0.85rem; background: #333; border: 1px solid #444; border-radius: 8px; color: white; font-size: 15px; margin-bottom: 1rem; }
  button { width: 100%; padding: 0.75rem; background: #1a5c2e; color: white; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
</style>
</head>
<body>
<div class="card">
  <h2>Admin access</h2>
  {% with messages = get_flashed_messages() %}{% if messages %}{% for msg in messages %}<div class="flash">{{ msg }}</div>{% endfor %}{% endif %}{% endwith %}
  <form method="POST">
    <label>Password</label>
    <input type="password" name="password" autofocus>
    <button type="submit">Sign in</button>
  </form>
</div>
</body>
</html>
