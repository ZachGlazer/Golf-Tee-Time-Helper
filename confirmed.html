<!-- templates/confirmed.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You're signed up!</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Source+Sans+3:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Source Sans 3', sans-serif; background: #faf8f3; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
  .card { background: white; border-radius: 12px; border: 1px solid #ddd8cc; padding: 2.5rem 2rem; text-align: center; max-width: 420px; }
  .check { width: 56px; height: 56px; border-radius: 50%; background: #e8f5ec; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem; font-size: 24px; }
  h2 { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: #1a5c2e; margin-bottom: 0.75rem; }
  p { font-size: 14px; color: #666; line-height: 1.6; margin-bottom: 1.5rem; }
  a { color: #1a5c2e; font-size: 14px; text-decoration: none; font-weight: 500; }
</style>
</head>
<body>
<div class="card">
  <div class="check">✓</div>
  <h2>You're all set!</h2>
  <p>We're now watching for tee times on your behalf. You'll get a text message as soon as something matching your preferences opens up.</p>
  <p style="font-size:13px;color:#999;">Checks happen every 5 minutes. You can unsubscribe any time.</p>
  <a href="/unsubscribe">Manage or cancel alerts</a>
</div>
</body>
</html>
