<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unsubscribe</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Source Sans 3', sans-serif; background: #faf8f3; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
  .card { background: white; border-radius: 12px; border: 1px solid #ddd8cc; padding: 2rem; max-width: 420px; width: 100%; }
  h2 { font-size: 1.2rem; font-weight: 500; margin-bottom: 0.5rem; }
  p { font-size: 13px; color: #666; margin-bottom: 1.25rem; }
  .flash { background: #fff8e6; border: 1px solid #c9a84c; color: #7a5c00; padding: 0.75rem 1rem; border-radius: 8px; font-size: 14px; margin-bottom: 1rem; }
  label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; }
  input { width: 100%; padding: 0.65rem 0.85rem; border: 1.5px solid #ddd; border-radius: 8px; font-size: 15px; margin-bottom: 1rem; }
  button { width: 100%; padding: 0.75rem; background: #c0392b; color: white; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
  a { display: block; text-align: center; margin-top: 1rem; font-size: 13px; color: #1a5c2e; text-decoration: none; }
</style>
</head>
<body>
<div class="card">
  <h2>Unsubscribe from tee time alerts</h2>
  <p>Enter your email and we'll stop sending you alerts.</p>
  {% with messages = get_flashed_messages() %}{% if messages %}{% for msg in messages %}<div class="flash">{{ msg }}</div>{% endfor %}{% endif %}{% endwith %}
  <form method="POST">
    <label>Your Ibis member email</label>
    <input type="email" name="email" placeholder="yourname@email.com" required>
    <button type="submit">Stop my alerts</button>
  </form>
  <a href="/signup">Update preferences instead</a>
  <a href="/">Back to home</a>
</div>
</body>
</html>
